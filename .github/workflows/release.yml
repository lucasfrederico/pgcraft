name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build cross-platform
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              out="dist/pgcraft-${os}-${arch}"
              [ "$os" = "windows" ] && out="${out}.exe"
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
                go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/pgcraft
            done
          done
          # windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" -o dist/pgcraft-windows-amd64.exe ./cmd/pgcraft
          (cd dist && for f in pgcraft-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done)
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
